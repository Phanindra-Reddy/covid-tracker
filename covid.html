<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
        <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">

            crossorigin="anonymous">
        <link rel="stylesheet" href="covid.css">
        <title>Covid19 Statistics Tracker</title>
        <link rel="icon" href="covid-img.jpg">
    </head>
  
    <body>
        <header class="header">
            <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
                <a class="navbar-brand" href="#"><b>COVID19</b> Tracker</a>
                <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
                  <span class="navbar-toggler-icon"></span>
                </button>
              
                <div class="collapse navbar-collapse text-center" id="navbarSupportedContent">
                    <ul class="navbar-nav ml-auto">
                        <hr class="bg-white"/>
                        <li class="nav-item active">
                          <a class="nav-link" href="#">Home</span></a>
                        </li>
                        <li class="nav-item active">
                          <a class="nav-link" href="countries.html">Countries</a>
                        </li>
                        <li class="nav-item active">
                            <a class="nav-link" href="india.html">India</a>
                        </li>
                    </ul>
                </div>
                <!-- <div class="heading text-center">
                    <h2 class="heading text-white"><b>COVID19</b> Tracker</h2>
                </div> -->

              </nav>
        </header>

        <section id="main">
            <div class="conatainer-fluid mainpage">
                <div id="map" class="world-map rounded p-2" onload="loadWorldMap()">                    
                    <!-- <iframe aria-describedby="" id="datawrapper-chart-gtof5" src="https://datawrapper.dwcdn.net/gtof5/1/" scrolling="" frameborder="0"></iframe> -->
                </div>
                <div class="country mx-auto">
                    
                    <div class="world rounded p-3" onload="loadWorldData()">
                        <h4 class="text-center">World Wide Covid Statistics</h4>
                        <ul class="list-group">
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                Total Cases
                                <span id="w-total" class="badge badge-primary badge-pill"></span>
                            </li>
                            <li  class="list-group-item d-flex justify-content-between align-items-center">
                                Active Cases
                                <span id="w-active" class="badge badge-primary badge-pill"></span>
                            </li>
                            <li  class="list-group-item d-flex justify-content-between align-items-center">
                                Critical Cases
                                <span id="w-critical" class="badge badge-primary badge-pill"></span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                Recovered
                                <span id="w-recover" class="badge badge-primary badge-pill"></span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                Deaths
                                <span id="w-deaths" class="badge badge-primary badge-pill"></span>
                            </li>    
                        </ul>
                    </div>

                    <div class="india rounded p-3" onload="loadIndiaData()">
                        <h4 class="text-center">India Wide Covid Statistics</h4>
                        <ul class="list-group">
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                              Total Cases
                              <span id="in-total" class="badge badge-primary badge-pill"></span>
                            </li>
                            <li  class="list-group-item d-flex justify-content-between align-items-center">
                                Active Cases
                                <span id="in-active" class="badge badge-primary badge-pill"></span>
                            </li>
                            <li  class="list-group-item d-flex justify-content-between align-items-center">
                              Critical Cases
                              <span id="in-critical" class="badge badge-primary badge-pill"></span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                Recovered
                                <span id="in-recover" class="badge badge-primary badge-pill"></span>
                            </li>
                            <li class="list-group-item d-flex justify-content-between align-items-center">
                                Deaths
                                <span id="in-deaths" class="badge badge-primary badge-pill"></span>
                              </li>
                          </ul>
                        
                    </div>
                    
                </div>
            </div>

            <div class="navbar navbar-expand-lg navbar-dark bg-dark text-white justify-content-center">
                <p class="footer m-3" >Copyright &copy; 2020 |
                    <a class="footer" href="https://phanindra-reddy.github.io/portfolio/" target="_blank">Phanindra Reddy</a>
                </p>
            </div>
        </section>
    </body>
